controller_manager:
  ros__parameters:
    update_rate: 50   # tune down if the MCU link can't sustain 50 Hz reliably
    use_sim_time: false

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    ackermann_steering_controller:
      type: ackermann_steering_controller/AckermannSteeringController

ackermann_steering_controller:
  ros__parameters:
    # Right-then-left ordering follows steering_controllers_library convention.
    traction_joints_names:
      - rear_right_wheel_joint
      - rear_left_wheel_joint

    steering_joints_names:
      - front_right_steer_joint
      - front_left_steer_joint

    # Geometry, must match robot_core.xacro (identical physical robot, sim or real)
    wheelbase: 0.21
    traction_track_width: 0.217
    steering_track_width: 0.217
    traction_wheels_radius: 0.05

    odom_frame_id: odom
    base_frame_id: base_footprint
    enable_odom_tf: false     # ekf_node publishes odom->base_footprint instead
    open_loop: false          # use actual MCU-reported joint velocity, not the commanded value
    position_feedback: false  # read the velocity state interface

    reference_timeout: 0.5
