; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; Board: ESP32-S3 N16R8 -> 16MB Quad Flash + 8MB Octal PSRAM.
; Confirmed via runtime detection (ESP.getFlashChipSize()/getPsramSize())
; against the actual board on /dev/ttyACM0. Uses PlatformIO's stock board def.

[env:esp32-s3-devkitc1-n16r8]
platform = espressif32
board = esp32-s3-devkitc1-n16r8
framework = arduino

; Most no-name ESP32-S3 N8R16 boards expose only the native USB port
; (no separate CP2102/CH340 UART bridge), so Serial needs USB-CDC.
; If your board DOES have a dedicated USB-UART chip, delete these two flags.
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

monitor_speed = 115200
upload_speed = 921600

; micro-ROS over USB serial -> bridged to ROS 2 topics by micro_ros_agent
; (see LKAS/src/mcu_agent). Distro must match the agent's ROS_DISTRO (jazzy).
lib_deps =
    https://github.com/micro-ROS/micro_ros_platformio.git
board_microros_transport = serial
board_microros_distro = jazzy

; Must run before micro_ros_platformio's own extra_script.py (registered via its
; library.json) so the CCFLAGS it reads are already sanitized. See file for why.
extra_scripts = pre:fix_matter_ccflags.py
