ekf_node:
  ros__parameters:
    use_sim_time: true
    frequency: 50.0
    sensor_timeout: 0.1
    two_d_mode: true   # constrain z=0, roll=0, pitch=0 (robot mặt đất)
    print_diagnostics: false
    debug: false

    # Khung tọa độ
    map_frame:       map
    odom_frame:      odom
    base_link_frame: base_footprint
    world_frame:     odom   # EKF tính odom→base_footprint

    publish_tf: true          # EKF publish TF odom→base_footprint (thay thế odom_tf_relay)
    publish_acceleration: false

    # ── Nguồn 1: Odometry từ encoder bánh xe ──────────────────────────────
    # Topic: /ackermann_steering_controller/odometry (nav_msgs/Odometry)
    # Cấu trúc bật/tắt từng trường: [x, y, z, roll, pitch, yaw,
    #                                 vx, vy, vz, vroll, vpitch, vyaw,
    #                                 ax, ay, az]
    odom0: /ackermann_steering_controller/odometry
    odom0_config: [true,  true,  false,    # x, y, z         — dùng x,y từ encoder
                   false, false, true,     # roll, pitch, yaw — dùng yaw từ encoder
                   true,  false, false,    # vx, vy, vz       — vx tiến là tin cậy nhất
                   false, false, true,     # vroll, vpitch, vyaw — vyaw từ encoder
                   false, false, false]    # ax, ay, az       — không có từ encoder
    odom0_queue_size: 10
    odom0_nodelay: false
    odom0_differential: false
    odom0_relative: false

    # ── Nguồn 2: IMU ──────────────────────────────────────────────────────
    # Topic: /imu (sensor_msgs/Imu, frame_id=imu_link)
    # EKF sẽ tự động biến đổi sang base_footprint qua TF (imu_link→base_link→base_footprint)
    imu0: /imu
    imu0_config: [false, false, false,    # x, y, z         — IMU không cho vị trí tuyệt đối
                  false, false, true,     # roll, pitch, yaw — dùng yaw từ IMU (sim: chính xác)
                  false, false, false,    # vx, vy, vz       — không dùng
                  true,  true,  true,     # vroll, vpitch, vyaw — gyroscope
                  true,  false, false]    # ax, ay, az       — ax tiến, ay/az bỏ qua nhiễu
    imu0_queue_size: 10
    imu0_nodelay: false
    imu0_differential: false
    imu0_relative: false
    imu0_remove_gravitational_acceleration: true   # loại bỏ g=9.81 khỏi az trước khi fuse
